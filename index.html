<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Country Genie — Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"] {
    --bg-0: #0a0e1c;
    --bg-1: #111733;
    --bg-2: #161e3d;
    --bg-3: #1d264c;
    --bg-4: #283362;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --text-0: #f4f6ff;
    --text-1: #d4d9eb;
    --text-2: #9098b5;
    --text-3: #5b6488;
    --indigo: #7b8cff;
    --indigo-2: #5468ee;
    --indigo-soft: rgba(123,140,255,0.14);
    --indigo-line: rgba(123,140,255,0.32);
    --teal: #4dd9c4;
    --amber: #f5b252;
    --rose: #ef5876;
    --land: #f0b32a;
    --land-2: #d99c1e;
    --water: #0a0e1c;
    --highlight: #ff8a3d;
    --very-high: #ef4444;
    --high: #f59e0b;
    --moderate: #eab308;
    --low: #22c55e;
    --panel-grad: linear-gradient(180deg, rgba(28,35,76,0.92), rgba(20,26,57,0.92));
    --shadow-strong: 0 8px 30px rgba(0,0,0,0.4);
    --shadow-soft: 0 8px 24px rgba(0,0,0,0.35);
    --hover-tint: rgba(255,255,255,0.04);
    --hover-tint-2: rgba(255,255,255,0.06);
    --hover-tint-3: rgba(255,255,255,0.1);
    --inset-bg: rgba(0,0,0,0.3);
    --scrim: rgba(0,0,0,0.6);
    --scrollbar: rgba(255,255,255,0.1);
    --scrollbar-hover: rgba(255,255,255,0.2);
  }
  [data-theme="light"] {
    --bg-0: #eef1f8;
    --bg-1: #ffffff;
    --bg-2: #f5f7fc;
    --bg-3: #eaeef7;
    --bg-4: #dde3f0;
    --land: #e6c98a;
    --land-2: #d2b269;
    --water: #e8edf6;
    --highlight: #d97706;
    --line: rgba(15,22,52,0.08);
    --line-2: rgba(15,22,52,0.16);
    --text-0: #0a0e1c;
    --text-1: #2c3354;
    --text-2: #5b6488;
    --text-3: #8088a8;
    --indigo: #4654d8;
    --indigo-2: #5468ee;
    --indigo-soft: rgba(84,104,238,0.10);
    --indigo-line: rgba(84,104,238,0.28);
    --panel-grad: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,249,253,0.98));
    --shadow-strong: 0 8px 30px rgba(15,22,52,0.10);
    --shadow-soft: 0 6px 18px rgba(15,22,52,0.08);
    --hover-tint: rgba(15,22,52,0.04);
    --hover-tint-2: rgba(15,22,52,0.06);
    --hover-tint-3: rgba(15,22,52,0.10);
    --inset-bg: rgba(15,22,52,0.05);
    --scrim: rgba(15,22,52,0.45);
    --scrollbar: rgba(15,22,52,0.18);
    --scrollbar-hover: rgba(15,22,52,0.32);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text-0); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; transition: background 0.2s, color 0.2s; }
  body { min-height: 100vh; }
  ::selection { background: var(--indigo-soft); }
  button { font-family: inherit; cursor: pointer; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif { font-family: 'Instrument Serif', serif; }

  /* App scaffold */
  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* scrollbars */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* Scrollbar that stays visible when content overflows */
  .scroll-visible { scrollbar-width: thin; scrollbar-color: var(--scrollbar-hover) transparent; }
  .scroll-visible::-webkit-scrollbar { width: 10px; }
  .scroll-visible::-webkit-scrollbar-track { background: var(--inset-bg); border-radius: 999px; }
  .scroll-visible::-webkit-scrollbar-thumb { background: var(--scrollbar-hover); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  .scroll-visible::-webkit-scrollbar-thumb:hover { background-color: var(--text-3); background-clip: padding-box; }

  /* utility */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; line-height: 1; }
  .badge-blue { background: rgba(123,140,255,0.18); color: #b6c2ff; }
  .badge-purple { background: rgba(186,123,255,0.18); color: #d4b6ff; }
  .badge-teal { background: rgba(77,217,196,0.16); color: #8eecd8; }
  .badge-amber { background: rgba(245,178,82,0.18); color: #fbcb83; }
  .risk-very-high { background: rgba(239,68,68,0.18); color: #ff8b8b; }
  .risk-high { background: rgba(245,158,11,0.18); color: #fbbf6b; }
  .risk-moderate { background: rgba(234,179,8,0.18); color: #f5d75a; }
  .risk-low { background: rgba(34,197,94,0.18); color: #5fdf8e; }

  [data-theme="light"] .badge-blue   { background: rgba(70,84,216,0.10);  color: #2f3aa8; }
  [data-theme="light"] .badge-purple { background: rgba(132,72,210,0.10); color: #5e2da8; }
  [data-theme="light"] .badge-teal   { background: rgba(20,150,130,0.12); color: #0e6b5b; }
  [data-theme="light"] .badge-amber  { background: rgba(190,120,20,0.12); color: #8a4f08; }
  [data-theme="light"] .risk-very-high { background: rgba(220,38,38,0.12);  color: #a31616; }
  [data-theme="light"] .risk-high      { background: rgba(217,119,6,0.14);  color: #8a4708; }
  [data-theme="light"] .risk-moderate  { background: rgba(180,140,0,0.16);  color: #6b5300; }
  [data-theme="light"] .risk-low       { background: rgba(22,140,70,0.14);  color: #0e5b2c; }

  .panel {
    background: var(--panel-grad);
    backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow-strong);
  }
  .panel-flat {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .panel-flat { /* keep .panel-flat radius identical */ }

  /* Animations */
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fade-in 0.3s ease both; }

  /* Citation chip */
  .cite {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 4px;
    background: var(--indigo-soft);
    color: var(--indigo);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    margin: 0 2px;
    cursor: pointer;
    border: 1px solid var(--indigo-line);
    vertical-align: 1px;
    transition: all 0.15s;
  }
  .cite:hover { background: rgba(123,140,255,0.3); color: white; }

  /* Map theme tokens */
  :root {
    --map-water: #0a1428;
    --map-land: #1c2440;
    --map-coast: rgba(255,255,255,0.06);
    --map-state: rgba(255,255,255,0.10);
    --map-grid: rgba(255,255,255,0.06);
  }
  [data-theme="light"] {
    --map-water: #e8eef7;
    --map-land: #d4d9e2;
    --map-coast: rgba(15,22,52,0.10);
    --map-state: rgba(15,22,52,0.10);
    --map-grid: rgba(15,22,52,0.08);
  }

  /* sparkline */
  .spark { display: block; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/map.jsx"></script>
  <script type="text/babel" src="src/country-panel.jsx"></script>
  <script type="text/babel" src="src/chat.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/grid.jsx"></script>
  <script type="text/babel" src="src/drilldown.jsx"></script>
  <script type="text/babel" src="src/publisher.jsx"></script>
  <script type="text/babel" src="src/header.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
